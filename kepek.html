<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Képek és videók</title>
    <link href="style.css" rel="stylesheet" type="text/css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Nestlé gyakorlat</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Gyár bemutatása</a></li>
        <li class="nav-item"><a class="nav-link" href="feladatok.html">Gyakorlat</a></li>
        <li class="nav-item"><a class="nav-link active" href="kepek.html">Képek/videók</a></li>
      </ul>
    </div>
  </div>
</nav>

<header class="bg-light text-center py-4">
  <h1>Képek és videók</h1>
</header>

<div class="container my-4">
  <div class="row g-4">

    <div class="col-12 col-md-4">
      <div class="ratio ratio-1x1">
        <img src="ardu.jpeg">
      </div>
    </div>

    <div class="col-12 col-md-4">
      <video class="w-100" controls>
        <source src="ardui.mp4" type="video/mp4">
      </video>
    </div>

    <div class="col-12 col-md-4">
      <video class="w-100" controls>
        <source src="plc.mp4" type="video/mp4">
      </video>
    </div>

    <ul class="kepek">
  <li><img src="nestlee.webp" alt="Nestlé" title="Nestlé"></li>
  <li><img src="nestleee.jpg" alt="Nestlé" title="Nestlé"></li>
</ul>

  </div>
</div>

<footer class="bg-dark text-light text-center py-3">
  <p class="mb-0">&copy; Horváth Márk István</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<div id="kepModal" class="kep-modal">
  <span class="kep-close">&times;</span>
  <img class="kep-modal-tartalom" id="kepModalImg">
</div>
<script>
  const kepek = document.querySelectorAll("img");
  const modal = document.getElementById("kepModal");
  const modalImg = document.getElementById("kepModalImg");
  const close = document.querySelector(".kep-close");

  kepek.forEach(kep => {
    kep.addEventListener("click", () => {
      modal.style.display = "block";
      modalImg.src = kep.src;
    });
  });

  close.onclick = () => {
    modal.style.display = "none";
  };

  modal.onclick = () => {
    modal.style.display = "none";
  };
</script>
</body>
</html>
